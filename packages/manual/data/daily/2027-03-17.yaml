meta:
  version: '2027-03-17'
  type: daily
modules:
  wire_routing:
    rule: '剪线模块从上到下展示 4 到 5 根彩色电线（颜色可重复）。在下方 rules 里按出现顺序找第一条 condition 与当前局面匹配的规则——first-match-wins，匹配到就停，绝不再尝试后续规则。condition 可能涉及 wire_count（电线数量）、color_at_last（最底端电线颜色）、count_red / count_blue / count_yellow / count_green / count_white / count_black 这类颜色计数、battery_count（电池数量,可用 { gt: N } / { lte: N } 这类比较）、indicator_FRK_lit 这类指示灯状态；空 condition: {} 是 catchall，恒为真，永远是最后一条兜底。target.position 是 0-indexed 自上而下编号：0 = 最上面那根，N-1 = 最底下那根（4 根线时 last = 3，5 根线时 last = 4）；关键字 first 与整数等价：first ≡ position 0；关键字 last 也与整数等价：last ≡ position length-1。如果 target 同时带 color 字段（例如 { position: ''last'', color: ''red'' }），含义是「按 position 方向（first 从顶部出发、last 从底部出发）找第一根该颜色的线」——color 是更强的过滤而不是位置覆盖，找不到该颜色就让 AI 视为本规则不适用、继续下一条。指示玩家时把 0-indexed 翻译成自然语言（position 0 = "从上数第 1 根"，last = "最底下那根"）——玩家不会读 YAML。'
    rules:
      - condition:
          wire_count: 4
          color_at_last: white
        action: cut_wire
        target:
          position: 1
      - condition:
          wire_count: 4
          count_red:
            gt: 1
        action: cut_wire
        target:
          position: last
          color: red
      - condition:
          wire_count: 4
          color_at_last: black
        action: cut_wire
        target:
          position: first
      - condition:
          wire_count: 4
          color_at_last: yellow
        action: cut_wire
        target:
          position: last
          color: red
      - condition:
          wire_count: 4
          color_at_last: green
        action: cut_wire
        target:
          position: last
      - condition:
          wire_count: 4
          battery_count:
            gt: 2
        action: cut_wire
        target:
          position: 2
      - condition:
          wire_count: 4
          color_at_last: blue
        action: cut_wire
        target:
          position: first
      - condition:
          wire_count: 4
          color_at_last: red
        action: cut_wire
        target:
          position: last
      - condition:
          wire_count: 4
        action: cut_wire
        target:
          position: first
      - condition:
          wire_count: 5
          color_at_last: yellow
        action: cut_wire
        target:
          position: first
      - condition:
          wire_count: 5
          indicator_FRK_lit: true
        action: cut_wire
        target:
          position: 2
      - condition:
          wire_count: 5
          color_at_last: blue
        action: cut_wire
        target:
          position: last
      - condition:
          wire_count: 5
          color_at_last: red
        action: cut_wire
        target:
          position: 3
      - condition:
          wire_count: 5
          count_blue:
            gt: 1
        action: cut_wire
        target:
          position: first
          color: blue
      - condition:
          wire_count: 5
        action: cut_wire
        target:
          position: 2
      - condition: {}
        action: cut_wire
        target:
          position: first
  symbol_dial:
    columns:
      - - hourglass
        - cross
        - crescent
        - spiral
        - delta
      - - cross
        - diamond
        - hourglass
        - xi
        - omega
      - - omega
        - psi
        - delta
        - spiral
        - star
      - - crescent
        - xi
        - star
        - psi
        - hourglass
      - - crescent
        - trident
        - spiral
        - diamond
        - omega
      - - star
        - trident
        - cross
        - delta
        - diamond
    rule: 玩家屏幕上看到 3 个轮盘（dial）并排放置，每个轮盘以摆轮形式只显示当前停在自家转盘第 0 格的那 1 个符号；玩家用左 / 右箭头让符号顺序滚动，按右箭头一次 = 顺时针走 1 格。玩家先把 3 个轮盘当前显示的符号 S1、S2、S3 报给你——生成器保证三个轮盘初始都停在自家转盘第 0 格，这是你必须无条件信任的不变式，玩家无法也无需报告这一点；生成器同时保证这 3 个起始符号互不相同，可信任玩家描述。在下方 columns 里找那条同时包含 S1、S2、S3 的列。6 条列的符号集合两两交集不超过 2 个，因此 3 个起始符号必定恰好命中唯一一条列，不存在歧义。对第 i 个轮盘，告诉玩家"按右箭头 N 次"，N = S_i 在命中列中的 index，0 ≤ N ≤ 4；N=0 表示已经对齐、不要让玩家旋转。每个轮盘有自己独立的 6 符号池（起始符号 + 5 个 filler），手册里只有上方 columns 这张查找表；filler 池写在前端代码里，对你不可见。你不能也不需要告诉玩家旋转后会看到什么符号——只输出"按右箭头几次"。如果玩家追问"目标排列是什么 / 我转完后会看到什么符号"，回答"按 N 次就好，不需要预知最终画面，转完会自然落到正确位置"，不要让玩家来确认目标符号。
  button:
    rule: '按钮模块只有一颗按钮，玩家会描述它的 color（red / blue / yellow / white）和上面印的 label（ABORT / DETONATE / HOLD / PRESS 等）。在下方 rules 里按出现顺序找第一条 condition 与当前局面匹配的规则——first-match-wins，匹配到就停，绝不再尝试后续规则。condition 可能涉及 color（按钮颜色）、label（按钮文字）、battery_count（场景中电池数量，可用 { gt: N } / { lte: N } 这类比较）、indicator_FRK_lit 这类指示灯状态；空 condition: {} 是 catchall，恒为真，永远是最后一条兜底。action 有两类：{ type: ''tap'' } 表示让玩家短按一下立即松开；{ type: ''hold'', release_on_light: ''X'' } 表示让玩家按住按钮不放，等旁边指示灯亮起 X 颜色（white / yellow / blue / red 之一）的那一刻再松开。指示玩家时直接说"短按一下"或"按住，等指示灯变成 X 色后再松开"——不要把 YAML 原文复述给玩家。'
    rules:
      - condition:
          color: white
        action:
          type: tap
      - condition:
          label: ABORT
        action:
          type: hold
          release_on_light: white
      - condition:
          color: white
          label: PRESS
        action:
          type: hold
          release_on_light: blue
      - condition:
          battery_count:
            lte: 2
        action:
          type: hold
          release_on_light: red
      - condition:
          color: blue
          label: ABORT
        action:
          type: hold
          release_on_light: white
      - condition:
          color: yellow
        action:
          type: tap
      - condition:
          battery_count:
            gt: 2
          label: DETONATE
        action:
          type: tap
      - condition:
          color: yellow
          battery_count:
            gt: 2
        action:
          type: hold
          release_on_light: yellow
      - condition:
          color: red
          indicator_FRK_lit: true
        action:
          type: tap
      - condition:
          color: blue
          label: DETONATE
        action:
          type: tap
      - condition:
          color: red
          label: HOLD
        action:
          type: tap
      - condition: {}
        action:
          type: tap
  keypad:
    sequences:
      - - star
        - crescent
        - delta
        - xi
        - trident
        - cross
      - - omega
        - diamond
        - crescent
        - xi
        - spiral
        - delta
      - - trident
        - spiral
        - star
        - xi
        - psi
        - omega
      - - psi
        - diamond
        - star
        - delta
        - cross
        - omega
      - - cross
        - hourglass
        - omega
        - trident
        - diamond
        - xi
      - - trident
        - delta
        - diamond
        - hourglass
        - star
        - spiral
    rule: 键盘模块是一个 2×2 共 4 个格子的面板，4 个符号全部可见，玩家会把看到的符号逐个描述给你——必要时让玩家用形状（笔画、弧线、跟日常物件的类比）来描述，再和你们此前约定的符号名称对齐，别让玩家从一串名字里硬猜。在下方 sequences 里找那条同时包含这 4 个可见符号的序列：6 条 sequence 的符号集合两两交集不超过 3 个，因此任意 4 个可见符号必定恰好命中唯一一条 sequence，不存在歧义。命中后，按该序列里这 4 个符号出现的先后次序依次让玩家点击——每次只下达一个玩家此刻就能执行的具体动作，例如"先点那个三角形"、"再点五角星"，玩家不需要理解"位置"或"序号"，只要照你报的符号去点即可。你是唯一持有手册的人，玩家看不到 sequences 这张表；绝不把 YAML 原文、序列内容或匹配过程复述给玩家，只把查表结果转成一句可执行的点击指令。
decoy_modules:
  morse_code:
    rules:
      - pattern: ... --- ...
        word: SOS
        action: transmit
      - pattern: .... . .-.. .-.. ---
        word: HELLO
        action: transmit
      - pattern: '-... --- -- -...'
        word: BOMB
        action: transmit
      - pattern: .-- .. .-. .
        word: WIRE
        action: cut
      - pattern: '-.. . - --- -. .- - .'
        word: DETONATE
        action: abort
      - pattern: .- .-. -- .
        word: ARME
        action: transmit
  maze:
    grid_size: 6
    rules:
      - start:
          - 0
          - 0
        end:
          - 5
          - 5
        path: RRRRRUUUUU
      - start:
          - 2
          - 3
        end:
          - 0
          - 0
        path: LLLUUU
      - start:
          - 1
          - 1
        end:
          - 4
          - 4
        path: RRRRUUU
      - start:
          - 3
          - 0
        end:
          - 3
          - 5
        path: UUUUU
      - start:
          - 0
          - 2
        end:
          - 5
          - 2
        path: RRRRR
  memory:
    stages: 5
    rules:
      - stage: 1
        display: 1
        action: press_position_2
      - stage: 1
        display: 2
        action: press_position_2
      - stage: 2
        display: 3
        action: press_label_4
      - stage: 3
        display: 1
        action: press_same_position
      - stage: 4
        display: 4
        action: press_same_label
      - stage: 5
        display: 2
        action: press_same_position_as_stage_1
