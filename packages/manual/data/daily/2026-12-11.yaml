    rule: 星符模块（玩家屏幕上叫星符，就是一块印着符号的格子面板）是一块 2×2 共 4 个格子的面板，4 个符号同时可见。你看不到屏幕，所以让玩家把这 4 个符号逐个描述给你——必要时让玩家用形状（笔画、弧线、跟日常物件的类比）来描述，再和你们此前约定的符号名称对齐，别让玩家从一串名字里硬猜，也绝不替玩家臆想没报过的符号。在下方 sequences 里找那条同时包含这 4 个可见符号的序列：6 条 sequence 的符号集合两两交集不超过 3 个，因此任意 4 个可见符号必定恰好命中唯一一条 sequence，不存在歧义——这条「描述符号 → 查表定出点击次序」的查表逻辑是本模块的设计核心，照常走、不要简化。命中后，按该序列里这 4 个符号出现的先后次序依次让玩家点击，每次只下达一个玩家此刻就能执行的具体动作。【默认按符号名指挥】下达点击时默认仍走符号名通道，例如"先点那个三角形"、"再点五角星"——符号名是默认通道，玩家把形状描述清楚、你能稳稳对上符号名时就照此指挥，够用就不必动用位置。【易混符号时切格子位置兜底】但当 4 个可见符号里出现已知易混对——三叉戟（trident）与 Ψ 形碗（psi）容易互相误描述、沙漏（hourglass）与等边三角形（delta）容易互相误描述——或玩家明确说有两个形状太相似、辨不下哪个是哪个时，别再死磕符号名：改用格子位置作无歧义的兜底指代。做法是先请玩家报出每个符号坐落在面板的哪一格（左上 / 右上 / 左下 / 右下），随后所有点击都用位置下达，例如"点左上那个"、"再点右下那个"。这样就把"指的是哪一格"（位置给出确定的指代）和"那一格画的是什么符号"（身份仍靠形状描述消歧、但已锚定到具体格子）拆开，避免"先点那个三叉戟"落到 Ψ 那格点错。位置是易混时才启用的兜底、不是默认主指代；它指的始终是玩家眼前那个符号所在的格子，是玩家亲眼可见、亲口报给你的稳定布局事实（和光弦让玩家从上到下报线同理），你只拿它当下达点击指令的参照，绝不自行想象屏幕长什么样，也绝不引入指针朝向、钟点或统一目标排列这类玩家没报、手册也没定义的东西。你是唯一持有手册的人，玩家看不到 sequences 这张表；绝不把 YAML 原文、序列内容或匹配过程复述给玩家，只把查表结果转成一句可执行的点击指令。
decoy_modules:
  morse_code:
    rules:
      - pattern: ... --- ...
        word: SOS
        action: transmit
      - pattern: .... . .-.. .-.. ---
        word: HELLO
        action: transmit
      - pattern: '-... --- -- -...'
        word: BOMB
        action: transmit
      - pattern: .-- .. .-. .
        word: WIRE
        action: cut
      - pattern: '-.. . - --- -. .- - .'
        word: DETONATE
        action: abort
      - pattern: .- .-. -- .
        word: ARME
        action: transmit
  maze:
    grid_size: 6
    rules:
      - start:
          - 0
          - 0
        end:
          - 5
          - 5
        path: RRRRRUUUUU
      - start:
          - 2
          - 3
        end:
          - 0
          - 0
        path: LLLUUU
      - start:
          - 1
          - 1
        end:
          - 4
          - 4
        path: RRRRUUU
      - start:
          - 3
          - 0
        end:
          - 3
          - 5
        path: UUUUU
      - start:
          - 0
          - 2
        end:
          - 5
          - 2
        path: RRRRR
  memory:
    stages: 5
    rules:
      - stage: 1
        display: 1
        action: press_position_2
      - stage: 1
        display: 2
        action: press_position_2
      - stage: 2
        display: 3
        action: press_label_4
      - stage: 3
        display: 1
        action: press_same_position
      - stage: 4
        display: 4
        action: press_same_label
      - stage: 5
        display: 2
        action: press_same_position_as_stage_1
