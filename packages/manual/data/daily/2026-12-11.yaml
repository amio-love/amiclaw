meta:
  version: '2026-12-11'
  type: daily
modules:
  wire_routing:
    rule: '光弦模块（玩家屏幕上叫光弦，就是一排彩色电线）面前有一排自上而下 4 到 5 根彩色电线（颜色可重复）。你看不到屏幕，所以让玩家从上到下把每根线的颜色依次报给你，再据此查表。在下方 rules 里按出现顺序找第一条 condition 与当前局面匹配的规则——first-match-wins，匹配到就停，绝不再尝试后续规则。condition 可能涉及 wire_count（电线数量）、color_at_last（最底端电线颜色）、count_red / count_blue / count_yellow / count_green / count_white / count_black 这类颜色计数、battery_count（电池数量,可用 { gt: N } / { lte: N } 这类比较）、indicator_FRK_lit 这类指示灯状态；空 condition: {} 是 catchall，恒为真，永远是最后一条兜底。target.position 是 1-indexed 自上而下编号：1 = 最上面那根，length = 最底下那根；position N 字面就是「从上数第 N 根」，与你念给玩家的自然语言指令逐字同构，无需任何换算。关键字 first 与整数等价：first ≡ position 1；关键字 last 也与整数等价：last ≡ position length（4 根线时 last = position 4，5 根线时 last = position 5）。如果 target 同时带 color 字段（例如 { position: ''last'', color: ''red'' }），含义是「按 position 方向（first 从顶部出发、last 从底部出发）找第一根该颜色的线」——color 是更强的过滤而不是位置覆盖；带 color 的规则其 condition 已保证该色在场上至少存在一根，所以一旦命中、沿 position 方向必定找得到那根目标色的线，color 目标恒可解。【严格按序，绝不跳读】必须严格自上而下逐条走规则，命中的判据是「这一条 condition 的每一个键都成立」；绝不因为某个特征最显眼、看起来最相关（例如全是黄线就直奔那条带 yellow 的规则）就跳过它前面的规则——哪怕前面那条看起来不起眼，只要它先命中就用它、并立即停止。举个会出错的反例：4 根线、电池 4、底端黄线时，按序第一条命中的是 battery_count>2 那条（剪 position 3，即从上数第 3 根），绝不能跳到后面那条 color_at_last:yellow 的规则。【颜色过滤是更强的过滤——绝不擅自换色】当一条规则的 target 带 color 字段时，它要剪的是「沿 position 方向（first 从顶部、last 从底部出发）找到的第一根该颜色的线」，触发它的 condition 颜色和它要剪的 action 颜色可以不一样。这类带 color 的规则其 condition 已保证该色在场上至少存在一根（例如要剪红线的规则，其 condition 必含一个保证红线存在的判据），所以一旦命中，沿 position 方向总能找到那根目标色的线、color 目标恒可解。color 是更强的过滤而不是位置覆盖：先按 position 方向走、只在该方向上挑出该颜色的线。绝不擅自把要剪的颜色换成场上有的别的颜色——要剪红就剪红，绝不因为某色更显眼或更顺手就改剪它。【场景信息缺了就先问，别猜】有些规则依赖电池数量、指示灯这类全局场景信息（玩家开局只会念一次）。轮到这类规则、而你手上没有对应数值时，先问玩家「现在电池几个 / 某指示灯亮没亮」，拿到确切值再回答；绝不靠猜一个场景信息去硬套规则——猜错会直接引爆。【只取被点名的指示灯，其余忽略】只有被规则 condition 点名的指示灯（如 indicator_FRK_lit 里的 FRK）才与本模块相关；场景信息栏里其余指示灯玩家照念无妨，你按规则只取需要的那一个、其余一律忽略，绝不拿没被点名的指示灯去套规则。【被点名的指示灯本局若没有，按"不亮"处理】被规则 condition 点名的指示灯（如 indicator_FRK_lit 里的 FRK）若不在玩家开局念出的那串指示灯里，就是本局根本没有这颗灯；一律按"该灯未亮"处理——凡是要求它亮（indicator_FRK_lit: true）的 condition 直接判为不成立，按 first-match 继续往下走下一条规则，绝不卡在这条、也绝不反过来假设它亮。注意和「缺了就先问」的区别：只有玩家还没报过指示灯、你确实不知道某灯亮没亮时才追问；玩家已经把本局指示灯报全、那串里没有它，就是确定它不存在=不亮，无须再问。'
    rules:
      - condition:
          wire_count: 4
          battery_count:
            gt: 2
        action: cut_wire
        target:
          position: 3
      - condition:
          wire_count: 4
          count_red:
            gt: 1
        action: cut_wire
        target:
          position: last
          color: red
      - condition:
          wire_count: 4
          color_at_last: red
        action: cut_wire
        target:
          position: last
      - condition:
          wire_count: 4
          color_at_last: blue
        action: cut_wire
        target:
          position: first
      - condition:
          wire_count: 4
          color_at_last: white
        action: cut_wire
        target:
          position: 2
      - condition:
          wire_count: 4
          color_at_last: yellow
          count_red:
            gt: 0
        action: cut_wire
        target:
          position: last
          color: red
      - condition:
          wire_count: 4
          color_at_last: black
        action: cut_wire
        target:
          position: first
      - condition:
          wire_count: 4
          color_at_last: green
        action: cut_wire
        target:
          position: last
      - condition:
          wire_count: 4
        action: cut_wire
        target:
          position: first
      - condition:
          wire_count: 5
          color_at_last: blue
        action: cut_wire
        target:
          position: last
      - condition:
          wire_count: 5
          indicator_FRK_lit: true
        action: cut_wire
        target:
          position: 3
      - condition:
          wire_count: 5
          color_at_last: red
        action: cut_wire
        target:
          position: 4
      - condition:
          wire_count: 5
          count_blue:
            gt: 1
        action: cut_wire
        target:
          position: first
          color: blue
      - condition:
          wire_count: 5
          color_at_last: yellow
        action: cut_wire
        target:
          position: first
      - condition:
          wire_count: 5
        action: cut_wire
        target:
          position: 3
      - condition: {}
        action: cut_wire
        target:
          position: first
  symbol_dial:
    columns:
      - - hourglass
        - crescent
        - xi
        - star
        - psi
      - - star
        - diamond
        - trident
        - delta
        - cross
      - - diamond
        - hourglass
        - xi
        - cross
        - omega
      - - delta
        - hourglass
        - cross
        - spiral
        - crescent
      - - star
        - spiral
        - omega
        - psi
        - delta
      - - spiral
        - crescent
        - omega
        - trident
        - diamond
    rule: 星盘模块（玩家屏幕上叫星盘，就是几个并排的符号轮）面前有 3 个并排的符号轮，玩家可以按左 / 右箭头让每个轮上的符号一格一格地往前 / 后拨。你看不到屏幕，所以你不知道此刻每个轮正中显示的是哪个符号——这唯一的一条输入只能向玩家要：请玩家把 3 个轮当前正中显示的符号 S1、S2、S3 逐个报给你。玩家报符号时若叫不准名字，让他用形状描述（笔画、弧线、跟日常物件的类比），你再对回符号名，别让玩家从一串名字里硬猜。生成器保证这 3 个当前符号互不相同，可信任玩家的描述。拿到 S1、S2、S3 后，在下方 columns 里找那条同时包含这三个符号的列：6 条列的符号集合两两交集不超过 2 个，因此 3 个符号必定恰好命中唯一一条列，不存在歧义。对第 i 个轮，告诉玩家"按右箭头 N 次"，N = S_i 在命中列里的 index（0 ≤ N ≤ 4）；N=0 表示这个轮已经对齐、不用拨。每个轮有自己独立的 6 符号池（当前符号 + 5 个 filler），手册里只有上方 columns 这张查找表，filler 池写在前端代码里、对你不可见；你不能也不需要预言玩家拨完后会看到什么符号，只输出"按右箭头几次"。绝不凭空臆想玩家没报过的画面属性——规则里没有指针方向、钟点位置或统一目标排列这些概念，玩家若提到这些就忽略、你只专注于玩家报的正中符号；玩家追问"目标是什么 / 我拨完会看到什么符号"时，回答"按 N 次就好，不需要预知最终画面，拨完自然就对了"，绝不让玩家替你确认目标符号，也绝不让玩家报告轮的指针朝向之类你看不到、规则也不需要的东西。
  button:
    rule: '按钮模块（玩家屏幕上叫按钮）只有一颗按钮。你看不到屏幕，所以让玩家把按钮的 color（red / blue / yellow / white）和上面印的 label（ABORT / DETONATE / HOLD / PRESS 等）报给你，绝不替玩家臆想按钮长什么样。在下方 rules 里按出现顺序找第一条 condition 与当前局面匹配的规则——first-match-wins，必须严格自上而下逐条走，绝不因为按钮颜色或文字最显眼就跳到看起来最相关的那条规则；匹配到就停，绝不再尝试后续规则。condition 可能涉及 color（按钮颜色）、label（按钮文字）、battery_count（场景中电池数量，可用 { gt: N } / { lte: N } 这类比较）、indicator_FRK_lit 这类指示灯状态；空 condition: {} 是 catchall，恒为真，永远是最后一条兜底。有些规则依赖电池数量、指示灯这类全局场景信息（玩家开局只念一次）；轮到这类规则、而你手上没有对应数值时，先问玩家「现在电池几个 / 某指示灯亮没亮」，拿到确切值再回答，绝不靠猜一个场景信息去硬套规则。action 有两类：{ type: ''tap'' } 表示让玩家短按一下立即松开；{ type: ''hold'', release_on_light: ''X'' } 表示让玩家按住按钮不放，等旁边灯条亮起 X 颜色（white / yellow / blue / red 之一）的那一刻再松开。指示玩家时直接说"短按一下"或"按住，等灯条变成 X 色后再松开"——不要把 YAML 原文复述给玩家。【按住后灯条会连续轮换多种颜色，必须等到你的目标色再松手】hold 时旁边灯条并不会停在某一种颜色，而是按住后连续地一种接一种地轮换好几种颜色；所以务必提醒玩家：在看到 release_on_light 指定的那个 X 色之前不要松手，绝不能一看到第一种亮起的颜色就当成到了、提前松开，要一直按住、盯着颜色一轮一轮地换、直到 X 色那一刻才松。【按住前的静态底色不作数】按钮在玩家按下去之前自带一个静态底色，那只是预览色、与规则完全无关：判定何时松手只看「按住之后」旁边灯条亮起的颜色（release_on_light），绝不能用按下前的静态底色去判断什么时候松手，也别让玩家拿这个底色当依据。【只取被点名的指示灯，其余忽略】只有被规则 condition 点名的指示灯（如 indicator_FRK_lit 里的 FRK）才与本模块相关；场景信息栏里其余指示灯玩家照念无妨，你按规则只取需要的那一个，其余一律忽略、绝不拿去套规则。【被点名的指示灯本局若没有，按"不亮"处理】被规则 condition 点名的指示灯（如 indicator_FRK_lit 里的 FRK）若不在玩家开局念出的那串指示灯里，就是本局根本没有这颗灯；一律按"该灯未亮"处理——凡是要求它亮（indicator_FRK_lit: true）的 condition 直接判为不成立，按 first-match 继续往下走下一条规则，绝不卡在这条、也绝不反过来假设它亮。注意和「缺了就先问」的区别：只有玩家还没报过指示灯、你确实不知道某灯亮没亮时才追问；玩家已经把本局指示灯报全、那串里没有它，就是确定它不存在=不亮，无须再问。【显示屏数字与规则无关】按钮下方显示屏上那个数字与按钮规则毫无关系，玩家若顺口报了就直接忽略，绝不拿它去匹配或推断任何规则。'
    rules:
      - condition:
          color: red
          indicator_FRK_lit: true
        action:
          type: tap
      - condition:
          label: ABORT
        action:
          type: hold
          release_on_light: white
      - condition:
          battery_count:
            lte: 2
        action:
          type: hold
          release_on_light: red
      - condition:
          color: blue
          label: ABORT
        action:
          type: hold
          release_on_light: white
      - condition:
          color: white
        action:
          type: tap
      - condition:
          battery_count:
            gt: 2
          label: DETONATE
        action:
          type: tap
      - condition:
          color: yellow
          battery_count:
            gt: 2
        action:
          type: hold
          release_on_light: yellow
      - condition:
          color: blue
          label: DETONATE
        action:
          type: tap
      - condition:
          color: white
          label: PRESS
        action:
          type: hold
          release_on_light: blue
      - condition:
          color: yellow
        action:
          type: tap
      - condition:
          color: red
          label: HOLD
        action:
          type: tap
      - condition: {}
        action:
          type: tap
