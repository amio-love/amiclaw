version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'UTC'
    groups:
      dependencies:
        update-types:
          - 'minor'
          - 'patch'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore(deps)'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'UTC'
    groups:
      github-actions:
        patterns:
          - '*'
    labels:
      - 'dependencies'
      - 'ci'
    commit-message:
      prefix: 'ci(deps)'
