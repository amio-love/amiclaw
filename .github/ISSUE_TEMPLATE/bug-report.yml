name: Bug Report
description: Report a bug or unexpected behavior
title: 'bug: '
labels: ['bug', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please include as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
      placeholder: Describe the unexpected behavior...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can this issue be reproduced?
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, version, browser, and any relevant environment details
      placeholder: |
        - OS: macOS 15
        - Browser: Chrome 134
        - Version: 1.2.3

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste stack traces or attach screenshots if useful.
      render: shell
