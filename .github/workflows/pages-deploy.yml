name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Pages artifact
        run: pnpm build

      # Belt-and-suspenders: `pnpm build` already runs assemble-pages.mjs which
      # merges packages/game-yijing/dist into packages/game/dist/oracle/. This
      # explicit step guarantees the merge even if the assemble script is
      # bypassed or changes. `cp -r src/. dest/` is idempotent (overwrites
      # same-named files; does not create dest/dist nesting).
      - name: Merge game-yijing build into game/dist under /oracle/
        run: |
          mkdir -p packages/game/dist/oracle
          cp -r packages/game-yijing/dist/. packages/game/dist/oracle/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy packages/game/dist --project-name=amiclaw --branch=main
