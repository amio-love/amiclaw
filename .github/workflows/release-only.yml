# .github/workflows/release-only.yml
# Responsibility: Triggered by tag push (created by release-please after PR merge).
# Reads the human-edited CHANGELOG.md to create the GitHub Release.
# For web apps deployed via Cloudflare Pages — no publish step needed.

name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release notes from CHANGELOG.md
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          chmod +x scripts/extract-release-notes.sh
          ./scripts/extract-release-notes.sh "$TAG_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
