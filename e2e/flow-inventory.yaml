# e2e/flow-inventory.yaml — BombSquad + AMIO Arcade platform user-flow SSOT
#
# This file is the single source of truth for all user-facing flows the e2e
# journey scenarios cover. Every journey Gherkin scenario in e2e/*.gherkin MUST
# trace back — via its per-scenario `# Source: <flow-id>` comment — to exactly
# one flow in this file (scenario <-> flow 1:1 bijection).
#
# Maintained on feature-merge DoD: "Is the new / changed / removed user flow
# reflected here?" Flow removal sets `status: deprecated` (never physical
# delete) so history stays traceable; the coverage audit only reconciles
# `status: active` flows.
#
# Governance SSOT: docs/architecture/arch-component-e2e-governance.md
# (vault mirror: pages/projects/amiclaw/architecture/arch-component-e2e-governance.md).
#
# --- Scope note --------------------------------------------------------------
# The flow set spans two surfaces: the BombSquad game flows and the Atlas
# platform-shell flows. The platform homepage (`/`) is a user-facing surface
# under e2e governance, so its non-game flows (hero render, tab navigation,
# countdown, zone styling) are inventoried here alongside the game flows.
#
# --- Regression size budget --------------------------------------------------
# Per the governance model (rule 3): the e2e regression suite is capped at
# 2 x the journey-scenario count. With 34 active flows <-> 34 journey
# scenarios, the regression size budget is 68 (2026-07-11, after the Radio
# Cipher listener-run flow landed as a @playwright journey).
# Crossing it triggers a forced prune audit. Current regression count: 2.
#
# --- Retired scenario --------------------------------------------------------
# The "daily final-module win-lock edge" scenario is NOT inventoried as a flow
# and carries no e2e journey scenario: the win-lock is pure gameReducer logic
# already guarded by the vitest test game-context.test.ts ("gameReducer —
# last-module win lock"). Per governance rule 1 (each regression lands at the
# lowest layer that catches it) it stays at the vitest layer.

flows:
  # === BombSquad game flows ===================================================

  - id: landing-to-practice
    name: Landing to practice mode
    description: >-
      A first-time visitor enters practice mode — a homepage BombSquad CTA
      opens the BombSquad landing page, its 练习 CTA enters the connect-AI flow,
      and finishing that two-step flow starts a 2-module practice run.
    steps: [landing, bombsquad-landing, cta-practice, connect-flow, game-practice, result]
    status: active

  - id: landing-to-daily
    name: Landing to daily challenge
    description: >-
      A player enters the daily challenge — a homepage BombSquad CTA opens the
      BombSquad landing page, its 每日挑战 CTA enters the connect-AI flow with
      the daily manual URL, and finishing that flow starts the 4-module run.
    steps: [landing, bombsquad-landing, cta-daily, connect-flow, game-daily, result]
    status: active

  - id: daily-win-to-leaderboard
    name: Daily win to leaderboard
    description: >-
      After defusing the daily bomb the result page celebrates first — no
      auto-opened modal — and a signed-in run auto-submits under the account
      name (ruling B), asking once inline which AI helped when the tool is not
      inferable; the player then navigates to the leaderboard to find their own
      row.
    steps: [result-win, tool-ask, score-submit, global-rank, leaderboard]
    status: active

  - id: leaderboard-ai-metadata
    name: Leaderboard AI metadata
    description: >-
      After a first daily win the rank-card CTA opens the deferrable gate that
      collects the player nickname, required AI assistant, and optional model,
      submits them with the score, and the leaderboard row displays the
      Chinese nickname and AI metadata.
    steps: [result-win, rank-cta, nickname-modal, ai-metadata, score-submit, leaderboard]
    status: active

  - id: daily-fail-strikeout
    name: Daily strike-out failure
    description: >-
      A daily run accumulates three wrong answers — the third strike detonates
      the bomb and opens the failure result page.
    steps: [game-daily, three-strikes, explosion, result-fail]
    status: active

  - id: daily-timeout
    name: Daily hard-cap neutral end
    description: >-
      A daily run's count-up stopwatch reaches the 1-hour hard cap — time is a
      score, not a detonator, so the run ends NEUTRALLY (no explosion), the
      gentle 差一点 result page opens, and no score is submitted to the
      leaderboard (the run never defused). The only daily failure path is the
      3-strike rule (see daily-fail-strikeout).
    steps: [game-daily, hard-cap, result-neutral, no-submit]
    status: active

  - id: practice-timeout
    name: Practice hard-cap neutral end
    description: >-
      A practice run's count-up stopwatch reaches the 1-hour hard cap — the run
      ends gently with no explosion and the player can start another run.
    steps: [game-practice, hard-cap, result-neutral, play-again]
    status: active

  # Deprecated 2026-06-03 by the endgame-settlement rework: the player-copied
  # recap summary was removed. The result page now shows the per-run stats for
  # the player to read directly, and the post-game debrief is initiated by the
  # AI partner in voice (defined by the manual's AI_INSTRUCTIONS, not by any app
  # data hand-off). No journey scenario claims this flow anymore. Per governance
  # rule, a removed flow is marked deprecated rather than physically deleted so
  # history stays traceable.
  - id: result-to-recap
    name: Result to recap copy
    description: >-
      From the result page the player copies the post-game recap as plain text
      to paste to their AI partner; the recap content varies by mode and score
      submission state.
    steps: [result, copy-recap, clipboard-plaintext]
    status: deprecated

  - id: result-page-survey
    name: Result-page endgame survey
    description: >-
      After any game outcome the result page shows a once-per-device endgame
      survey as a dismissable survey-only modal. The survey delay starts only
      once the celebration beat has settled — on a first daily win that means
      after the deferred leaderboard gate is filled and the rank outcome
      arrives — so it never stacks over the rank reveal. Submitting posts a
      survey_submit event; submitting or skipping both retire the survey for
      the device.
    steps: [game-end, result, celebration-settled, post-game-survey-modal, survey-submit-or-skip]
    status: active

  # The flow id is kept stable across the Atlas redesign (renaming it would
  # ripple to the journey scenario's `# Source:` comment for no governance
  # gain); the redesign moved the discovery link from the retired PromptModal
  # into the connect-AI flow's first step.
  - id: prompt-modal-to-compatibility
    name: Connect flow to compatibility page
    description: >-
      From the connect-AI flow's first step a new player opens the voice-AI
      compatibility page to see the supported AIs, and returns to the BombSquad
      landing page.
    steps: [connect-step-1, compatibility-link, compatibility-page, back-to-landing]
    status: active

  - id: bombsquad-first-run-intro
    name: BombSquad first-run connect primer
    description: >-
      A brand-new anonymous player entering the BombSquad connect flow gets a
      once-per-device「怎么玩」primer (F1) BEFORE the「把手册发给 AI」step: it
      bridges the unconventional premise (you + a voice AI partner splitting the
      bomb vs the manual), points players WITH a voice AI at the manual handoff
      and players WITHOUT one at the platform companion behind login, and is
      skippable in one tap into the same BYO steps. It shows only on the first
      BYO entry (per-device localStorage flag); returning players and signed-in
      companion owners never see it, so the landing-to-daily / landing-to-practice
      flows stay unchanged. The dedicated scenario carries @connect-intro-fresh to
      opt out of the default already-seen fixture seed.
    steps: [connect-first-entry, howto-primer, primer-dismiss, connect-step-1]
    status: active

  # === Atlas platform-shell flows =============================================

  - id: home-anonymous-hero
    name: Anonymous homepage hero
    description: >-
      An anonymous visitor lands on the Atlas platform homepage and sees the
      anonymous hero plus every homepage section, rendered dark-only with no
      horizontal overflow at a phone viewport.
    steps: [landing-anonymous, atlas-hero, homepage-sections]
    status: active

  - id: home-signed-in-welcome
    name: Signed-in homepage welcome
    description: >-
      A signed-in visitor lands on the homepage and sees the personalized
      welcome strip in place of the anonymous hero and the anonymous-only
      sections.
    steps: [landing-signed-in, welcome-strip, hero-hidden]
    status: active

  - id: platform-tab-navigation
    name: Platform tab navigation
    description: >-
      The platform top navigation routes between the 游戏, 排行榜, 社区, and 我的
      tabs; the 排行榜 tab is the leaderboard browse path.
    steps: [landing, top-nav, tab-games, tab-leaderboard, tab-community, tab-account]
    status: active

  - id: daily-countdown-display
    name: Daily countdown display
    description: >-
      The homepage featured BombSquad overview shows a live 时 / 分 / 秒
      countdown ticking toward the next daily reset, plus a day-boundary hint
      stating that daily content follows the UTC date and rolls over at the
      viewer's localized wall-clock time (08:00 for Beijing users).
    steps: [landing, featured-bombsquad-overview, countdown-tick, reset-rule-hint]
    status: active

  - id: bombsquad-zone-styling
    name: BombSquad zone styling
    description: >-
      The homepage carries no BombSquad cyan anywhere — cyan is wire-only — and
      the featured BombSquad zone uses the brand yellow as its accent.
    steps: [landing, homepage-no-cyan, featured-bombsquad-yellow]
    status: active

  - id: community-real-feed
    name: Community real event stream
    description: >-
      The community page is a REAL, derived event stream — its fabricated static
      posts were removed. A visitor opens /community and sees honest player
      activity synthesized from durable play events (daily defusals 通关,
      streak-board entries 上榜, streak milestones 里程碑) of players who joined
      the public streak board, each carrying a live relative-time label rendered
      off the real event timestamp (the fix for the F4 frozen「12 分钟前」bug).
      The one interaction is a real, persistent like; an anonymous like attempt
      surfaces the honest one-line login hint instead of fabricating a count. An
      empty window shows the honest quiet state (pinned by the CommunityPage unit
      tests, which also cover the signed-in optimistic like).
    steps: [community-page, real-feed, relative-time, anon-like-gate]
    status: active

  - id: leaderboard-history-navigation
    name: Leaderboard date navigation
    description: >-
      From the leaderboard page the player walks the daily time board back to
      yesterday with the compact date switcher — exactly the window the KV
      board retention guarantees (LEADERBOARD_RETENTION_DAYS = 2; the backend
      TTL and the switcher window derive from the same shared constant).
      前一天 loads yesterday's board from the same `?date=` API, both bounds
      disable their arrow, and the retention boundary is stated honestly
      under the board (更早的日榜未保存; durable personal records live in the
      /me 7-day history) — an expired day is never rendered as a false empty
      board.
    steps: [leaderboard, date-switcher, yesterday-board, retention-boundary, back-to-today]
    status: active

  - id: footer-to-privacy-policy
    name: Footer privacy policy navigation
    description: >-
      A visitor clicks the 隐私 link in the platform footer and lands on the
      /privacy route, where the full privacy policy renders inside the platform
      shell.
    steps: [landing, footer-privacy-link, privacy-page]
    status: active

  - id: footer-to-terms
    name: Footer terms-of-service navigation
    description: >-
      A visitor clicks the 条款 link in the platform footer and lands on the
      /terms route, where the full user agreement renders inside the platform
      shell.
    steps: [landing, footer-terms-link, terms-page]
    status: active

  # === mode② auth flows =======================================================
  # The platform's real, revocable session (mode②/point-of-need login). Two
  # sign-in paths: email magic link and Google OAuth.

  - id: magic-link-login-request
    name: Magic-link login request
    description: >-
      A signed-out visitor opens /login (which now also offers a Google sign-in
      button), enters an email, submits, and sees the unified anti-enumeration
      confirmation — the same message regardless of whether the email is known,
      so the page never reveals which addresses can sign in.
    steps: [login-page, email-input, submit, unified-confirmation]
    status: active

  - id: google-login-start
    name: Google OAuth login start
    description: >-
      A signed-out visitor on /login sees the Google sign-in button, which is a
      real navigational link to /api/auth/google/start (the browser follows the
      302 to Google's consent screen). The server-side OAuth round-trip — state
      CSRF check, token exchange, callback session creation — is covered by the
      backend integration tests, not e2e, since the harness serves a static
      build with no Workers runtime and Google's consent screen is cross-origin.
    steps: [login-page, google-button, google-start-link]
    status: active

  - id: account-signed-out-guide
    name: Account page signed-out guide
    description: >-
      A signed-out visitor opens /me and sees the login-guide empty state — a
      heading, the plain-text unlock preview, and a 登录 CTA routing to /login —
      and none of a fake profile.
    steps: [account-page-anonymous, login-guide, login-cta-to-login]
    status: active

  - id: account-signed-in-profile
    name: Account page signed-in profile
    description: >-
      A signed-in visitor opens /me and sees the real-identity profile — the
      display name derived from the session email plus the email — and the
      honest empty stats state (没有成绩 + a play CTA), not fabricated numbers.
      Accounts with records additionally get the 最近 7 天 per-day history
      (打卡 / best daily time / 卦签), so yesterday's records stay visible
      after the daily rollover; the empty account hides that section.
    steps: [account-page-signed-in, real-identity, honest-empty-stats]
    status: active

  # === mode② companion & memory flows =========================================
  # The account-anchored companion with two-layer memory (episodes + profile
  # claims). The companion-setup flow is now browser-drivable (@playwright): the
  # onboarding UI (/me/companion) landed and the harness route-mocks
  # /api/companion* like the auth session. The other two flows stay @simulation:
  # the memory-capture pipeline that produces real episodes + claims is a
  # downstream wire task, so the album / profile surfaces have no live data to
  # drive in a browser yet — their behaviour is covered by the vitest suites
  # against the real schema (packages/companion-memory, packages/api).

  - id: companion-setup
    name: Companion first-time setup
    description: >-
      A signed-in mode② player opens /me/companion, names their companion and
      picks one of three platform voices; on success the identity is read back
      (GET /api/companion) and shown as "你的伙伴 X". The companion is 1:1 with
      the account (the user_id primary key), so revisiting onboarding shows the
      existing companion instead of the setup form — no second-companion path
      exists anywhere on the platform (a second POST is rejected with 409).
    steps: [signed-in, companion-onboarding, companion-readback, one-companion-invariant]
    status: active

  - id: companion-dock-presence
    name: Companion dock voice greeting and mute memory
    description: >-
      A signed-in player with a companion sees the persistent 伙伴坞 (companion
      dock) on the platform shell. With lobby voice enabled, opening the homepage
      runs the ratified auto-voice-on-login sequence: the arrival greeting TEXT
      lands first (节拍 1 — template-filled from real data; the harness's empty
      album renders the honest no-episode variant), THEN the microphone is
      requested (the text-first invariant is pinned — the greeting was on screen
      before the request), THEN on GRANT the lobby voice session opens over the
      stubbed /ai-ws/lobby-* bridge and the streamed greeting becomes the dock
      bubble's live subtitle (design Option B). Muting from the dock's control
      menu closes the live channel, lands the dock in its 静音 state, and persists
      the quiet-remembered posture to the account (PUT /api/companion/settings) —
      future visits land quiet. The anonymous no-dock state is pinned by the
      CompanionDock unit tests.
    steps:
      [
        signed-in-companion,
        arrival-greeting-text-first,
        mic-granted,
        voice-greeting-subtitle,
        dock-mute,
        posture-persisted,
      ]
    status: active

  - id: companion-dock-denied-voice
    name: Companion dock denied-microphone quiet presence
    description: >-
      A signed-in player with a companion whose microphone is DENIED during the
      auto-voice-on-login sequence: the arrival greeting TEXT still lands first
      (the text-first invariant holds — the greeting was on screen before the
      permission request), but the request is refused, so no voice channel opens.
      The companion lands as a quiet text presence (the dock's 静音 state), never
      auto-requests the mic again, and the denial is persisted to the account
      (denied-remembered posture via PUT /api/companion/settings) so future visits
      stay quiet. The mic-button manual-retry path is pinned by
      CompanionDock.lobby-voice.test.tsx.
    steps:
      [
        signed-in-companion,
        arrival-greeting-text-first,
        mic-denied,
        quiet-text-presence,
        denied-remembered-persisted,
      ]
    status: active

  - id: companion-coplay-entry
    name: Companion co-play daily entry default
    description: >-
      A signed-in player WITH a companion entering the daily challenge gets the
      companion co-play path (mode②, the platform voice partner) as the DEFAULT:
      the connect page replaces the two-step manual handoff with a one-tap
      「和 X 一起进入」 that navigates straight to the run carrying
      ?partner=platform (the manual rides the voice session's create message).
      Per the owner ruling there is no co-equal platform-AI-vs-BYO chooser — BYO
      (mode①) is demoted to a low-key secondary link, still one tap away.
      Anonymous and companion-less players keep the original two-step BYO flow
      unchanged (covered by landing-to-daily). The in-game voice panel connects
      over the stubbed /ai-ws/* bridge and the AI greets first, proving the
      co-play wire end to end.
    steps:
      [
        signed-in-companion,
        bombsquad-landing,
        cta-daily,
        coplay-default,
        byo-secondary-link,
        mode2-run,
        voice-connected,
      ]
    status: active

  - id: companion-memory-album
    name: Memory album and profile control
    description: >-
      After a finished session is asynchronously consolidated, the player
      browses episodic memories (GET /api/companion/memories), reads each
      profile understanding with its episode evidence chain
      (GET /api/companion/profile), and deletes a memory — which cascades:
      understandings that lost their last active evidence retire and stop
      injecting.
    steps: [session-end, consolidation, memory-album, evidence-chain, delete-cascade]
    status: active

  - id: companion-memory-injection
    name: Next-session memory injection
    description: >-
      Starting the next mode② session, the platform resolves the companion
      context (profile + claim subset + recent/high-salience memories) and
      injects it deterministically into the system prompt — isomorphic to the
      manual injection, never via model function-calling. Turning the profile
      off (PUT /api/companion/profile) stops claim injection immediately while
      visible memories and the companion identity remain.
    steps: [session-create, resolver, deterministic-injection, profile-switch]
    status: active

  # === mode② in-game voice flow ===============================================
  # The account-anchored platform voice partner wired into a daily run. The
  # real-provider turn (DeepSeek + Volcengine over the live `/ai-ws/*` bridge) is
  # verified by a human play-green plus the standalone live-turn harness, so the
  # e2e journey stubs the WebSocket boundary and the mic and asserts the panel's
  # UI states only — never real audio or provider output.

  - id: mode2-voice-session-turn
    name: mode② in-game hands-free voice greeting
    description: >-
      An opted-in daily run (`?mode=daily&partner=platform`) mounts the in-game
      platform voice panel, hands-free full-duplex: it connects to the platform-ai
      bridge and the AI greets first with no player input, the AI's streamed text
      reply renders, the "说话中" (speaking) indicator shows while the stubbed TTS
      audio plays, the panel settles back to "聆听中" (listening) when the greeting
      ends, and exiting the run tears the voice session down. The `/ai-ws/*`
      WebSocket and the microphone are stubbed deterministically (no live provider,
      no real audio; the fake mic is fed a silent capture file so the client VAD
      never fires a player turn); the real-provider turn and the VAD-triggered
      player turn are verified by a human play-green and the standalone live-turn
      harness.
    steps:
      [
        daily-platform-partner,
        voice-connected,
        ai-greets-first,
        ai-speaking,
        settle-listening,
        session-teardown,
      ]
    status: active

  # === Dual Shadow Chase flows ===============================================

  - id: shadow-chase-deterministic-solo
    name: Dual Shadow Chase deterministic solo play
    description: >-
      A visitor opens the Shadow Chase SPA, reads the five-second head-start
      rule, starts a solo run, and activates a companion Anchor command while
      optional model handoffs return unavailable. The deterministic loop stays
      live and exposes no multi-human room, matchmaking, PvP, or voice-room
      affordance.
    steps: [shadow-chase-start, opening-grace, companion-anchor, fallback-live]
    status: active

  - id: shadow-chase-mobile-controls
    name: Dual Shadow Chase mobile controls
    description: >-
      At a 390x844 phone viewport, the Shadow Chase board remains separate from
      its command and direction controls, and every action target remains at
      least 44 pixels high.
    steps: [shadow-chase-start, mobile-viewport, touch-targets, board-separation]
    status: active

  # === Yijing Oracle flows ====================================================
  # The /oracle/ hash-routed SPA. The flow is an honest ritual: the cast is a
  # REAL three-coin cast (crypto randomness, full 64-hexagram manual — the
  # harness rigs the randomness source for journey determinism), every reading
  # text is classical manual data, and no screen claims AI, voice, or
  # mind-reading involvement (audit F24/F25 rework).

  - id: oracle-honest-session
    name: Yijing Oracle honest coin-cast ritual
    description: >-
      A visitor walks the full oracle session — home → 2-pick projection →
      six real three-coin throws (crypto randomness; harness-rigged to the
      classic 同人→无妄 cast) → staged classical reading (本卦 卦辞 → 变爻
      爻辞 → 变卦 卦辞, no fabricated dialogue) → sign card with 今日提点 —
      and no screen in the flow renders an AI / voice / mind-reading or
      demo-label claim.
    steps: [oracle-home, projection-picks, coin-cast, classical-reading, sign-card]
    status: active

  # === Radio Cipher flows =====================================================
  # The /radio-cipher/ hash-routed SPA. A two-role voice cipher: the listener
  # types the decrypted answer (the real content + creation engine drive state
  # and the all-solved win), while the shareable decoder codebook is derived
  # from the engine's decoder role-view — so it teaches the finals-ring cipher
  # method and channel protocol without ever carrying a plaintext answer (the
  # information partition holds by construction, not by discipline).

  - id: radio-cipher-listener-run
    name: Radio Cipher listener tutorial win with leak-free codebook
    description: >-
      A visitor opens the Radio Cipher listener, reads the two-role onboarding,
      dismisses it, and wins the two-module tutorial by submitting each
      decrypted answer (engine-driven decryption → all-solved win). The
      shareable decoder codebook then teaches the finals-ring cipher and channel
      protocol while leaking no listener-side plaintext answer.
    steps: [radio-listener-open, onboarding-dismiss, tutorial-decrypt, run-won, codebook-partition]
    status: active
